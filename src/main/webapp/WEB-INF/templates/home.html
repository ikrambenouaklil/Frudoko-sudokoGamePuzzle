<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Frudoko — Fruit Sudoku</title>
</head>
<body>


<main layout:fragment="content">
    <th:block th:replace="~{fragments/variables :: vars(~{::section})}">
    <section>
                     <!-- ── Hero section ────────────────────────── -->
        <div class="hero-section d-flex flex-column align-items-center justify-content-center text-center">

            <div class="fruit-title mb-2">
                <img th:src="${apple}" class="fruit-icon fruit-icon--title">
                Frudoko
                <img th:src="${orange}" class="fruit-icon fruit-icon--title">
            </div>
            <p class="hero-subtitle mb-5">Le Sudoku aux fruits — simple, coloré, addictif !</p>

            <!-- 4x4 preview grid -->
            <div class="preview-grid mb-5" aria-hidden="true">
                <!-- row 1 -->
                <span><img th:src="${apple}" class="fruit-icon"></span>
                <span><img th:src="${banana}" class="fruit-icon"></span>
                <span><img th:src="${grape}" class="fruit-icon"></span>
                <span><img th:src="${orange}" class="fruit-icon"></span>

                <!-- row 2 -->
                <span><img th:src="${grape}" class="fruit-icon"></span>
                <span><img th:src="${orange}" class="fruit-icon"></span>
                <span><img th:src="${apple}" class="fruit-icon"></span>
                <span><img th:src="${banana}" class="fruit-icon"></span>

                <!-- row 3 -->
                <span><img th:src="${banana}" class="fruit-icon"></span>
                <span><img th:src="${apple}" class="fruit-icon"></span>
                <span><img th:src="${orange}" class="fruit-icon"></span>
                <span><img th:src="${grape}" class="fruit-icon"></span>

                <!-- row 4 -->
                <span><img th:src="${orange}" class="fruit-icon"></span>
                <span><img th:src="${grape}" class="fruit-icon"></span>
                <span><img th:src="${banana}" class="fruit-icon"></span>
                <span><img th:src="${apple}" class="fruit-icon"></span>
            </div>

            <div class="d-flex gap-3 flex-wrap justify-content-center">
                <a th:href="@{/login}" class="btn btn-fruit btn-lg px-5 fs-6">
                    <img th:src="${key}" class="icon-btn"> Se connecter
                </a>
                <a th:href="@{/register}" class="btn btn-outline-fruit btn-lg px-5 fs-6">
                    <img th:src="${sparkle}" class="icon-btn"> S'inscrire
                </a>
            </div>

            <a th:href="@{/scoreboard}" class="mt-4 text-white-50 text-decoration-none hover-white">
                <img th:src="${trophy}" class="fruit-icon btn-icon">  Voir le classement
            </a>

        </div>
        <!-- ── Feature cards ──────────────────────────────────────────── -->
        <div class="container pb-5">
            <div class="row g-4 justify-content-center">

                <!-- Card 1 -->
                <div class="col-md-3">
                    <div class="feature-card text-center">
                        <div class="feature-icon">
                            <img th:src="${trophy}" class="fruit-icon"/>
                        </div>
                        <h5>3 Difficultés</h5>
                        <p>Facile, Moyen, Difficile — pour tous les niveaux</p>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="col-md-3">
                    <div class="feature-card text-center">
                        <div class="feature-icon">
                            <img th:src="${save}" class="fruit-icon"/>
                        </div>
                        <h5>Sauvegarde Auto</h5>
                        <p>Reprenez exactement là où vous en étiez</p>
                    </div>
                </div>

                <!-- Card 3 -->
                <div class="col-md-3">
                    <div class="feature-card text-center">
                        <div class="feature-icon">
                            <img th:src="${trophy}" class="fruit-icon"/>
                        </div>
                        <h5>Classement</h5>
                        <p>Battez les meilleurs scores mondiaux</p>
                    </div>
                </div>

            </div>
        </div>
</section>
    </th:block>
</main>
</body>
</html>
