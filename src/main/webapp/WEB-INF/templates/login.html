<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Connexion — Frudoko</title>



</head>

<body class="fruit-bg d-flex align-items-center justify-content-center" style="min-height:100vh">

<main layout:fragment="content">

    <th:block th:replace="~{fragments/variables :: vars(~{::section})}">
 <section>
    <div class="auth-card">
    <!-- Header -->
    <div class="text-center mb-4">
        <a th:href="@{/home}" class="text-decoration-none">

                <img th:src="${grape}" class="fruit-icon" >

        </a>
        <h3 class="mt-2 text-white fw-bold">Connexion</h3>
        <p class="text-white-50 small">Bienvenue sur Frudoko !</p>
    </div>
    <!-- Error message -->
    <div th:if="${error}" class="alert alert-danger alert-sm text-center py-2 mb-3" th:text="${error}"></div>

    <!--login form-->
    <form method="post"  th:action="@{/login}" novalidate>

        <div class="mb-3">
            <label class="form-label text-white-50 small">Email or username</label>
            <input type="text"
                   name="identifier"
                   class="form-control auth-input"
                   placeholder="Email or username"
                   required
                   autocomplete="username"/>
        </div>

        <div class="mb-4">
            <label class="form-label text-white-50 small">Mot de passe</label>
            <div class="input-group">
                <input type="password"
                       id="passwordInput"
                       name="password"
                       class="form-control auth-input"
                       placeholder="••••••••"
                       required
                       autocomplete="current-password"/>
                <button class="btn btn-outline-secondary"
                        type="button"
                        onclick="togglePassword(this)">
                    <img th:src="${eyes}"
                         th:attr="data-open=${eyes}, data-close=@{/images/close-eye.png}"
                         style="width:25px;">
                </button>
            </div>
        </div>

        <button type="submit" class="btn btn-fruit w-100 py-2 mb-3">
            Se connecter →
        </button>

    </form>

        <p class="text-center text-white-50 small mb-0">
            Pas encore de compte ?
            <a th:href="@{/register}" class="text-fruit">S'inscrire</a>
        </p>

</div>
     <script>
         function togglePassword(btn) {
             const input = document.getElementById('passwordInput');
             const icon = btn.querySelector('img');

             if (input.type === 'password') {
                 input.type = 'text';
                 icon.src = icon.dataset.close;
             } else {
                 input.type = 'password';
                 icon.src = icon.dataset.open;
             }
         }
     </script>


 </section>
    </th:block>

</main>
</body>
</html>
